# Tessera policy — Snowflake byDataset row visibility
# Counterpart to spec/v0/examples/acl-row-visibility-policy.tessera.yaml.
# IR shape identical; platform-bound table identifiers swapped for Snowflake.

policy:
  id: snowflake-byDataset-row-visibility
  version: 1.0.0
  kind: RowVisibilityConstraint
  description: |
    A principal sees rows of BRICETEST.TESSERA.SNOW_ORDERS_RLS_ACL whose
    O_ORDERPRIORITY is granted to them via the two-table ACL join
    (RLS_ACL_MAPPING ⋈ RLS_PRIORITY_ACL on CODE_NAME). Principals not in the
    ACL mapping see no rows (fail-closed; defaultStrategy: none).

  appliesTo:
    selector: byIdentity
    resource: table:BRICETEST.TESSERA.SNOW_ORDERS_RLS_ACL

  action: Read

  defaultStrategy: none

  rules:
    - principal:
        selector: byDataset
        dataset:
          type: PrincipalSetFromTable
          table: BRICETEST.TESSERA.RLS_ACL_MAPPING
          principalColumn: USERNAME
          resourceColumn: CODE_NAME
      condition:
        op: exists-in-dataset
        operands:
          - type: ResourceSetFromTable
            table: BRICETEST.TESSERA.RLS_PRIORITY_ACL
            principalColumn: CODE_NAME
            resourceColumn: O_ORDERPRIORITY
      effect: keep-matching-rows

  capabilityRequirements:
    - data-driven-selectors
    - two-table-join-via-codename
    - fail-closed-on-acl-absence

  provenance:
    notes: |
      Snowflake counterpart to acl-row-visibility-policy. IR structurally
      identical to the Databricks ACL IR. Platform divergence lives in the
      adapter emission: Snowflake produces CREATE ROW ACCESS POLICY -> EXISTS,
      Databricks produces CREATE FUNCTION ... AS FILTER ... EXISTS.

      Diagnostic surfaces one v0 IR finding: the resourceColumn field of
      ResourceSetFromTable is conflated as both the ACL table's column name
      and the protected table's column name. The exercise aligned the two
      (both O_ORDERPRIORITY) to make the adapter emission well-formed, but
      v1 should split them.
