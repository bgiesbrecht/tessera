# Column-mask policy on bg_rls_demo.tpch.orders.o_clerk.
#
# Worked-example artifact, single-pass exercise (Phase 2 + Phase 3 collapsed).
# Companion files:
#   column-mask-orders-clerk-policy.jsonld    — canonical (JSON-LD) form
#   column-mask-orders-clerk.databricks.sql   — adapter emission target
#   column-mask-orders-clerk.diagnostic.md    — per-element enforcement report
#   column-mask-orders-clerk.comparison.md    — comparison vs existing SQL
#
# Inputs: docs/exercises/column-mask-orders-clerk-inputs.md
# Existing implementation: pre-ABAC `ALTER COLUMN ... SET MASK` form on
# bg_rls_demo.tpch.orders.o_clerk, with a CASE-based UDF gating on
# is_account_group_member('orders_full_access').
#
# This is a two-branch column visibility policy:
#   - Members of orders_full_access: pass-through (effect: allow, no transform)
#   - Everyone else (the default branch): redact to 'CLERK-REDACTED'
#
# defaultStrategy: negated-complement matches the existing SQL's
# structurally-negated-complement ELSE clause. The defaultBranch carries
# the Redact transformation directly.
#
# Expected v0 finding: the JSON Schema currently requires `transformation`
# on every rule in a ColumnVisibilityConstraint policy. The
# `orders_full_access` rule below has `effect: allow` and no
# transformation — by the policy's intent, a pass-through doesn't need
# one. The schema correction is recorded as ADR-022; see the diagnostic.

"@context": https://bgiesbrecht.github.io/tessera/spec/v0/context.jsonld
"@type": Policy
"@id": policy:column-mask-orders-clerk
version: 1.0.0
policyKind: ColumnVisibilityConstraint
description: >
  Column-visibility policy on bg_rls_demo.tpch.orders.o_clerk. Members of
  the `orders_full_access` group see the unredacted clerk value;
  everyone else sees the literal `'CLERK-REDACTED'`.

appliesTo:
  selector: byIdentity
  resource: column:bg_rls_demo.tpch.orders.o_clerk

action: Read

defaultStrategy: negated-complement

# Single rule: the full-access pass-through. The default branch (below)
# handles the redaction for everyone else under negated-complement.
rules:

  - principal:
      selector: byIdentity
      resource: group:orders_full_access
    effect: allow
    # No transformation — members see the original value. Schema currently
    # rejects this (ColumnVis rules required to carry transformation);
    # ADR-022 corrects the constraint to be effect-driven.

# defaultBranch — applied to principals not in any rule. For column
# visibility under negated-complement, the default branch carries the
# transformation to apply. Members of orders_full_access bypass this
# branch via the rule above; everyone else hits the Redact.
defaultBranch:
  effect: transform
  transformation:
    type: Redact
    replacement: 'CLERK-REDACTED'

provenance:
  notes: |
    Hand-authored for the column-mask worked example.
    Combined-input single-pass exercise: the existing implementation
    SQL was shared up front (see the comparison document). The Phase 2
    derivation followed the intent described in the inputs document.
