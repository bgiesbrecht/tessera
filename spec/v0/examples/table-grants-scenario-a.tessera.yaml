# Tessera policy — table-grants Scenario A
# Single-table affirmative read grant.
#
# Now authored as AccessGrantConstraint (ADR-026, 2026-05-20). The prior
# squeeze-into-RowVisibilityConstraint shape (with effect: allow) worked
# structurally but mis-communicated intent; the diagnostic §3.4 recorded the
# awkwardness; ADR-026 closes it.

policy:
  id: table-grants-scenario-a
  version: 1.0.0
  kind: AccessGrantConstraint
  description: |
    Marketing analytics team can Read bg_rls_demo.tpch.orders.
    Purely affirmative; principals not in the group fall through to whatever
    other policies or platform defaults apply (defaultStrategy omitted).

  appliesTo:
    selector: byIdentity
    resource: table:bg_rls_demo.tpch.orders

  action: Read

  rules:
    - principal:
        selector: byIdentity
        resource: group:bg_rls_demo_marketing_analytics
      effect: allow
